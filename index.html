    <script>
      (function () {
        const root = document.getElementById("root");
        const isHomePage = window.location.pathname === "/" || window.location.pathname === "";
        let appLoaded = false;
        const loadApp = () => {
          if (appLoaded) return;
          appLoaded = true;
          import("/assets/" + "bootstrap.js");
        };
        if (!isHomePage || !root || root.childNodes.length === 0) {
          loadApp();
          return;
        }
        const timer = window.setTimeout(loadApp, 60000);
        const loadAndCleanup = () => {
          window.clearTimeout(timer);
          window.removeEventListener("pointerdown", loadAndCleanup);
          window.removeEventListener("keydown", loadAndCleanup);
          loadApp();
        };
        window.addEventListener("pointerdown", loadAndCleanup, { once: true, passive: true });
        window.addEventListener("keydown", loadAndCleanup, { once: true });
      })();
    </script>
